name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create a GitHub Release

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Capacitor > 7 requires Node 22+

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Web Application
        # This will create the 'dist' folder defined in your capacitor.config.ts
        run: npm run build

      - name: Install Capacitor
        run: npm install @capacitor/cli @capacitor/core @capacitor/android
        
      - name: Sync Capacitor Android
        # Syncing copies the built web assets into the Android native project
        run: npx cap sync android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Android builds generally require Java 21 now

      - name: Grant execute permission for gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build Android Debug APK
        working-directory: ./android
        # Compiles the debug APK. Change to `assembleRelease` for production builds 
        # (requires setting up Android keystore signing secrets in GitHub Actions).
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # This is the default path to the APK generated from a debug build
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Development Build ${{ github.run_number }}
          body: 'Auto-generated Android APK from the latest push to the main branch.'
          prerelease: true
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
